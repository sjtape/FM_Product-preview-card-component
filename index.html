<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->
        <link rel="stylesheet" href="./style.css" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />

        <title>Frontend Mentor | Product preview card component</title>

        <style>
            @import url("https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap");
        </style>
    </head>
    <body>
        <main>
            <div class="container">
                <article class="card">
                    <figure class="product-image">
                        <picture>
                            <source
                                media="(min-width:769px)"
                                srcset="./images/image-product-desktop.jpg"
                            />
                            <img
                                src="./images/image-product-mobile.jpg"
                                alt="Perfume image"
                            />
                        </picture>
                    </figure>
                    <div class="product-content">
                        <header>
                            <span class="label">Perfume</span>
                            <h1>Gabrielle Essence Eau De Parfum</h1>
                        </header>
                        <div class="product-description">
                            <p>
                                A floral, solar and voluptuous interpretation
                                composed by Olivier Polge, Perfumer-Creator for
                                the House of CHANEL.
                            </p>
                        </div>
                        <div class="product-price">
                            <p>
                                <b class="discount">$149.99</b>
                                <span class="old price"><del> $169.99 </del> </span>
                            </p>
                        </div>
                        <button class="btn-cta">Add to Cart</button>
                    </div>
                </article>
            </div>
        </main>
        <footer class="attribution">
            Challenge by
            <a href="https://www.frontendmentor.io?ref=challenge"
                >Frontend Mentor</a
            >. Coded by <a href="#">sjtape</a>.
        </footer>
    </body>
</html>
